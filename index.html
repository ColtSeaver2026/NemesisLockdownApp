<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Token Bag Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>TOKEN BAG MANAGER</h1>

  <div class="controls">
    
    <div class="row-players">
    <label>Spielerzahl:</label>
    <div><input type="number" id="players" value="1" min="1" max="5" class="hidden" readonly>
      <div class="playerCount">
        <div class="player active">1</div>
        <div class="player">2</div>
        <div class="player">3</div>
        <div class="player">4</div>
        <div class="player">5</div>
        </div>
      </div>
    </div>

    <div class="row-actions">
    <button id="fillBtn" class="btn-primary">Beutel füllen</button>
    <button id="fillManually" class="btn-primary">Beutel anpassen</button>
    </div>
  
    <div class="row-back">
    <div class="draw-area">
    <button id="drawBtn">Xeno-Begegnung</button>
      <button id="returnBtn">Xeno-Ausbreitung</button></div>
     <div class="back-area">
       <button id="goBack">Rückgängig</button></div>
    </div>

    
   
  </div>



<div class="encounter-panel">

    <div class="turn-counter">
      
        
      <span id="current-turn">Zug -</span>
    </div>

    <div class="alert-header" id="currentAction">
        ⚠  ⚠
    </div>

 
    <div class="enemy-token" id="current-token">
        <img>
    </div>

    <div class="stats">

        <div class="stat-box light">
          <img src="https://s1.directupload.eu/images/260601/wxrb9yl5.png" alt="licht" id="lightImage">
            <div class="value" id="light-input">-</div>
        </div>

        <div class="stat-box dark">
            <img src="https://s1.directupload.eu/images/260601/5ahh985g.png" alt="dunkelheit" id="darkImage">
            <div class="value" id="dark-input">-</div>
        </div>

    </div>

    <div class="event-banner" id="current-action">
        -
    </div>


    <div class="bag-section">

        <h2>BEUTEL</h2>
        <div id="bag-wrapper">
        <div id="bag">
      </div>
      </div>

    

    </div>

</div>

<!-- Modal -->
<div id="modal" class="hidden">
  <div class="modal-content">
    <p>CHARAKTER IM NEST?</p>
    <div class="modal-buttons">
      <button id="yesBtn" class="danger">JA</button>
      <button id="noBtn">NEIN</button>
    </div>
  </div>
</div>
  
  <div id="modalFill" class="hidden">
  <div class="modal-content">
    <p>Beutel neu füllen? Der aktuelle Inhalt wird überschrieben.</p>
    <div class="modal-buttons">
      <button id="yesFillBtn" class="danger">JA</button>
      <button id="noFillBtn">NEIN</button>
    </div>
  </div>
</div>
  
 <div id="modalManually" class="hidden">
  <div class="modal-content">
    <p>Beutel manuell befüllen</p>
    <label>Leer:</label>
    <input type="number" id="manuallyLeer" value="1" min="1" max="1" readonly>
    <label>Larve (max. 8):</label>
    <span class="manuallyDown">-</span>
    <input type="number" id="manuallyLarve" value="1" min="0" max="8" readonly>
    <span class="manuallyUp">+</span>
     <label>Kriecher (max. 3):</label>
    <span class="manuallyDown">-</span>
    <input type="number" id="manuallyKriecher" value="1" min="0" max="3" readonly>
    <span class="manuallyUp">+</span>
     <label>Jäger (max. 12):</label>
    <span class="manuallyDown">-</span>
    <input type="number" id="manuallyJäger" value="1" min="0" max="12" readonly>
    <span class="manuallyUp">+</span>
     <label>Brutbestie (max. 2):</label>
    <span class="manuallyDown">-</span>
    <input type="number" id="manuallyBrutbestie" value="1" min="0" max="2" readonly>
    <span class="manuallyUp">+</span>
     <label>Königin (max. 1):</label>
    <span class="manuallyDown">-</span>
    <input type="number" id="manuallyKönigin" value="1" min="0" max="1" readonly>
    <span class="manuallyUp">+</span>
    
    <div class="modal-buttons">
      <button id="manullayYesBtn" class="danger">Füllen</button>
      <button id="manuallyNoBtn">Abbrechen</button>
    </div>
  </div>
</div>
  
  
  
<div class="modalSpin" id="modalSpin">
  <div class="modalSpin-content">
  <div class="top-bar">
    <div class="closeSpin-btn" id="closeSpinBtn">✖</div>
  </div>

  <div class="token-grid" id="tokenGrid"></div>
</div>
</div>

<script src="script.js"></script>

</body>


</html>
